name: CI

# Every job below is blocking and green on the tree it was added to.
#
# The three linters start at their *error* tier on purpose. The tree has
# pre-existing findings at the lower tiers, and a repo-wide cleanup does not
# belong in the commit that introduces CI. Each tier is a ratchet: a follow-up PR
# cleans one level, then raises the gate here. Measured on 73ac638:
#
#   ruff              E701/E702 (29, need a formatter), E402 (9, several are
#                     load-bearing sys.path patches), E722 (2, changes behavior)
#   shellcheck        --severity=warning: 2 findings
#   PSScriptAnalyzer  -Severity Warning: 322 findings
#
# Nothing is silenced: the deferred tiers are listed above so raising them is a
# decision, not a discovery.

# Branch flow: feature -> dev -> main. Both protected branches are gated: CI runs
# on every PR into dev or main, and again on the merge result.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  import-closure:
    name: Installer import closure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every mem0-server module is shipped by the installer
        run: bash scripts/ci/check-import-closure.sh

  tests:
    name: Python tests (public suites)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # httpx is imported at module scope by ship_log_reclassify; fastapi by the
      # server modules some suites import (security_invariants, app handlers);
      # fastmcp by the MCP-shim contract tests (they skip wholesale without it).
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check --quiet pytest httpx fastapi fastmcp
      # The explicit list below is the HEADLESS subset: every file runs green on a
      # clean runner with no live stack (no Qdrant/mem0/llama-swap/Codex). The
      # remaining files in mem0-server/tests are the live-stack suites — they ship
      # for operators to run against a real deployment and are deliberately not
      # collected here (unguarded HTTP to :18791/:6333, or `import app` which
      # builds the live Memory client at import time). test_egemma_embedder needs
      # the heavy `mem0` package and runs locally only.
      - name: Run the suites that need no live stack
        run: |
          python -m pytest -q \
            mem0-server/tests/test_admission_gate.py \
            mem0-server/tests/test_autopromote_actor.py \
            mem0-server/tests/test_canonical_key_provider.py \
            mem0-server/tests/test_codex_shim_client.py \
            mem0-server/tests/test_config_import_closure.py \
            mem0-server/tests/test_contradiction_resolve.py \
            mem0-server/tests/test_contradiction_sweep.py \
            mem0-server/tests/test_dpapi_fetch_key.py \
            mem0-server/tests/test_egemma_rollback_prune.py \
            mem0-server/tests/test_episodic_reconcile.py \
            mem0-server/tests/test_failure_injection.py \
            mem0-server/tests/test_freshness.py \
            mem0-server/tests/test_l10_audit.py \
            mem0-server/tests/test_ledger_audit.py \
            mem0-server/tests/test_mcp_shim_contract.py \
            mem0-server/tests/test_nli_write_gate.py \
            mem0-server/tests/test_open_questions.py \
            mem0-server/tests/test_phase2a_canary.py \
            mem0-server/tests/test_r2_injection_gating.py \
            mem0-server/tests/test_redact.py \
            mem0-server/tests/test_replay_ops.py \
            mem0-server/tests/test_reranker.py \
            mem0-server/tests/test_shim_offline.py \
            mem0-server/tests/test_systemd_parity.py \
            mem0-server/tests/test_tier_parity.py \
            claude-config/tests \
            scripts/wsl/test_ship_log_classifier.py \
            scripts/wsl/test_ship_log_reclassify.py

  docs-gate:
    name: Docs gate (links, operator-neutral, ADR frontmatter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check docs
        run: python scripts/ci/check-docs.py

  pester:
    name: Pester (Windows product suites)
    # The Windows-side product tests: hook libs, installer parity, daemon/client,
    # gates. They sandbox via TestDrive/fake USERPROFILE, mock HTTP, and use only
    # what a stock runner ships (powershell.exe 5.1 for child-process tests, .NET
    # Framework csc for the compiled-client build test). Environment-dependent
    # Describes self-skip on a runner (no deployed stack present).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester 5
        shell: pwsh
        run: Install-Module Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -SkipPublisherCheck -ErrorAction Stop
      - name: Run the Windows product suites
        shell: pwsh
        run: |
          $r = Invoke-Pester scripts/windows/tests -Output Detailed -PassThru
          if ($r.FailedCount -gt 0) { throw "Pester: $($r.FailedCount) failed" }

  ruff:
    name: ruff (pyflakes tier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: python -m pip install --disable-pip-version-check --quiet ruff
      # Full pyflakes: real bugs (undefined names, redefinitions) plus dead code
      # (unused imports and variables). Green since the dead code was removed.
      - name: Lint
        run: ruff check --select F --output-format=github .

  shellcheck:
    name: shellcheck (error tier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # shellcheck ships preinstalled on the GitHub-hosted ubuntu runners.
      - name: Lint shell scripts
        run: |
          mapfile -t files < <(git ls-files '*.sh')
          printf 'checking %d shell script(s)\n' "${#files[@]}"
          shellcheck --severity=error "${files[@]}"

  psscriptanalyzer:
    name: PSScriptAnalyzer (error tier)
    # PSScriptAnalyzer parses the AST — it never executes the scripts — so it runs
    # on Linux via cross-platform pwsh (preinstalled on the ubuntu runners). Keeps
    # the matrix on one OS and off the 2x-cost Windows runners.
    # Note: the module requires pwsh >= 7.4.6.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop
      - name: Analyze PowerShell scripts
        shell: pwsh
        run: |
          $findings = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error
          if ($findings) {
            $findings | Format-Table -AutoSize | Out-String -Width 200 | Write-Host
            throw "PSScriptAnalyzer reported $($findings.Count) error-severity finding(s)"
          }
          Write-Host 'PSScriptAnalyzer: no error-severity findings.'
